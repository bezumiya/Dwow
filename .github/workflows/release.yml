name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r companion/requirements.txt
      - run: python tools/generate_protocol.py --check
      - run: python -B companion/test_roundtrip.py
      - run: python tools/package_release.py
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*.zip
